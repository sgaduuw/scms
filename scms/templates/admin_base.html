<!DOCTYPE html>
<html lang="en">

<head>
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.2/dist/terminal.min.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Terminal CSS</title>
    <style>
        .components-grid {
            display: grid;
            grid-column-gap: 1.4em;
            grid-template-columns: auto;
            grid-template-rows: auto;
        }

        .image-grid {
            display: grid;
            grid-template-rows: auto;
            display: grid;
            grid-gap: 1em;
            grid-template-rows: auto;
            grid-template-columns: repeat(auto-fit,
                    minmax(calc(var(--page-width) / 12), 1fr));
        }

        @media only screen and (min-width: 70em) {
            .components-grid {
                grid-template-columns: 3fr 9fr;
            }
        }
    </style>
    <style>
        :root {
            --global-font-size: 15px;
            --global-line-height: 1.4em;
            --global-space: 10px;
            --font-stack: Menlo, Monaco, Lucida Console, Liberation Mono,
                DejaVu Sans Mono, Bitstream Vera Sans Mono, Courier New, monospace,
                serif;
            --mono-font-stack: Menlo, Monaco, Lucida Console, Liberation Mono,
                DejaVu Sans Mono, Bitstream Vera Sans Mono, Courier New, monospace,
                serif;
            --background-color: #222225;
            --page-width: 60em;
            --font-color: #e8e9ed;
            --invert-font-color: #222225;
            --secondary-color: #a3abba;
            --tertiary-color: #a3abba;
            --primary-color: #62c4ff;
            --error-color: #ff3c74;
            --progress-bar-background: #3f3f44;
            --progress-bar-fill: #62c4ff;
            --code-bg-color: #3f3f44;
            --input-style: solid;
            --display-h1-decoration: none;
        }
    </style>
</head>

<body class="terminal">
    <div class="container">
        <div class="terminal-nav">
            <header class="terminal-logo">
                <div class="logo terminal-prompt"><a href="/admin" class="no-style">Admin</a></div>
            </header>
            <nav class="terminal-menu">
                <ul vocab="https://schema.org/" typeof="BreadcrumbList">
                    <li property="itemListElement" typeof="ListItem">
                        <a href="/admin/sites" property="item" typeof="WebPage" class="menu-item"><span property="name">Sites</span></a>
                        <meta property="position" content="1">
                    </li>
                    <li property="itemListElement" typeof="ListItem">
                        <a href="/admin/users" property="item" typeof="WebPage" class="menu-item"><span property="name">Users</span></a>
                        <meta property="position" content="2">
                    </li>
                </ul>
            </nav>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>

</html>
