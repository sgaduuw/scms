{% extends "admin_base.html" %}

{% block content %}
<form action="" method="post" novalidate>
    {{ form.hidden_tag() }}
    <fieldset>
        <legend>Sign in</legend>
        <div class="form-group">
            {{ form.username.label }}
            {{ form.username(size=32) }}
        </div>
        <div class="form-group">
            {{ form.password.label }}
            {{ form.password(size=32) }}
        </div>
        <div class="form-group">
            {{ form.submit() }}
        </div>
    </fieldset>
</form>
{% endblock %}
