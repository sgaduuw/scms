{% extends "base.html" %}
{% block content %}
<h1>Lists</h1>
<h2>{{ site.name }}</h2>
<ul>
        {% for content in site.content %}
        <li>
                <b>{{ content.title }}</b><br>
                <b>{{ content.date }}</b><br>
                {{ content.text }}
        </li>
        {% endfor %}
</ul>
{% endblock %}
